name: CI

on:
  push: {}

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/ci-setup

      - name: Build
        run: |
          bazel build //...

      - name: Test
        run: |
          bazel test //... --test_output=errors
